<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D QR Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --accent: #d4af37;
            --text: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Başlıq və Sosial Media */
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--accent); letter-spacing: 4px; margin: 0; }
        .social-icons { display: flex; justify-content: center; gap: 20px; margin: 15px 0; font-size: 1.5rem; }
        .social-icons i { color: var(--accent); }

        /* Menyu Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 800px; margin: 0 auto; }
        .menu-card { 
            background: var(--card-bg); border-radius: 20px; padding: 12px; 
            text-align: center; border: 1px solid #333; transition: 0.3s;
        }
        .menu-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; }
        .menu-card h3 { font-size: 0.9rem; margin: 10px 0; }
        .price { color: var(--accent); font-weight: 600; }

        /* --- 3D TƏRKİB MODALI --- */
        #composition-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }

        .ingredients-container {
            perspective: 1000px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .ingredient-3d-card {
            width: 140px; height: 100px;
            background: #222;
            border: 2px solid var(--accent);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.8rem;
            color: var(--text);
            text-align: center;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3);
            /* 3D Hərəkət Efekti */
            transform: rotateX(25deg) rotateY(-10deg);
            animation: float3d 3s infinite ease-in-out;
        }

        @keyframes float3d {
            0%, 100% { transform: rotateX(25deg) rotateY(-10deg) translateY(0); box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3); }
            50% { transform: rotateX(20deg) rotateY(5deg) translateY(-15px); box-shadow: 0 25px 50px rgba(212, 175, 55, 0.5); }
        }

        .close-btn { position: absolute; top: 30px; right: 30px; font-size: 2.5rem; color: white; cursor: pointer; }

        /* --- ADMİN PANEL (Geri Qaytarıldı) --- */
        #admin-login, #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fdfaf5; z-index: 3000; display: none; color: #333;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; }
        
        #admin-panel { background: white; overflow-y: auto; display: none; padding: 20px; box-sizing: border-box; justify-content: flex-start; }
        .admin-item { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .admin-trigger { position: fixed; bottom: 0; left: 0; width: 50px; height: 50px; z-index: 999; opacity: 0; }
    </style>
</head>
<body>

    <header>
        <h1>QR MENU</h1>
        <p>Dadlı yeməklər</p>
        <div class="social-icons">
            <i class="fab fa-tiktok"></i>
            <i class="fab fa-whatsapp"></i>
            <i class="fas fa-wifi"></i>
        </div>
    </header>

    <div class="menu-grid" id="menu-container"></div>

    <div id="composition-modal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <h2 id="modal-title" style="color: var(--accent); margin-bottom: 30px;">Tərkibi</h2>
        <div class="ingredients-container" id="ingredients-list"></div>
    </div>

    <div id="admin-login">
        <div class="login-box">
            <i class="fas fa-cog" style="font-size: 3rem; color: #ccc; margin-bottom: 20px;"></i>
            <h3>Admin Paneli</h3>
            <input type="password" id="admin-pass" placeholder="Şifrə">
            <button onclick="checkLogin()">Daxil ol →</button>
            <p onclick="closeAdmin()" style="margin-top:15px; font-size:0.8rem; color:#888;">Geri qayıt</p>
        </div>
    </div>

    <div id="admin-panel">
        <h2 style="text-align:center">İdarəetmə</h2>
        <div id="admin-list" style="width:100%"></div>
        <button onclick="location.reload()" style="width:100%; padding:15px; background:black; color:white; border-radius:15px; border:none; margin-top:20px;">Yadda saxla</button>
    </div>

    <div class="admin-trigger" onclick="adminClick()"></div>

    <script>
        // FIREBASE QOŞULMASI (Linkini bura daxil et)
        const firebaseConfig = { databaseURL: "SƏNİN_FIREBASE_LINKİN" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 30 Yemək Datası
        const foods = [
            { name: "Mərci Şorbası", price: 4, img: "https://images.pexels.com/photos/539451/pexels-photo-539451.jpeg?w=400", ingredients: ["Qırmızı Mərci", "Kərə yağı", "Limon", "Nanə"] },
            { name: "Sezar Salatı", price: 12, img: "https://images.pexels.com/photos/1213710/pexels-photo-1213710.jpeg?w=400", ingredients: ["Toyuq filesi", "Parmezan", "Suxari", "Xüsusi sous"] },
            { name: "Steyk Burger", price: 15, img: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?w=400", ingredients: ["Dana əti", "Çeddar", "Turşu", "Qırmızı soğan"] },
            { name: "Pizza Marqarita", price: 14, img: "https://images.pexels.com/photos/1146760/pexels-photo-1146760.jpeg?w=400", ingredients: ["Motsarella", "Pomidor", "Reyhan", "İtalyan xəmiri"] }
        ];

        // 30-a tamamlama
        for(let i=5; i<=30; i++) {
            foods.push({
                name: "Təzə Yemək " + i, price: i+2, img: "https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?w=400",
                ingredients: ["Təzə Ət", "Tərəvəz", "Zirə", "Xüsusi dad"]
            });
        }

        // Menyunun ekrana verilməsi
        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            foods.forEach((food, index) => {
                container.innerHTML += `
                    <div class="menu-card" onclick="openComposition(${index})">
                        <img src="${food.img}">
                        <h3>${food.name}</h3>
                        <div class="price">${food.price} AZN</div>
                    </div>
                `;
            });
        }

        // 3D Tərkib Açılışı
        function openComposition(index) {
            const list = document.getElementById('ingredients-list');
            document.getElementById('modal-title').innerText = foods[index].name;
            list.innerHTML = '';
            
            foods[index].ingredients.forEach((ing, i) => {
                setTimeout(() => {
                    list.innerHTML += `<div class="ingredient-3d-card">${ing}</div>`;
                }, i * 150);
            });
            document.getElementById('composition-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('composition-modal').style.display = 'none'; }

        // ADMİN FUNKSİYALARI
        let clicks = 0;
        function adminClick() { clicks++; if(clicks >= 3) { document.getElementById('admin-login').style.display='flex'; clicks=0; } }
        function closeAdmin() { document.getElementById('admin-login').style.display='none'; }
        
        function checkLogin() {
            if(document.getElementById('admin-pass').value === '123') {
                document.getElementById('admin-login').style.display='none';
                document.getElementById('admin-panel').style.display='flex';
                renderAdmin();
            } else { alert("Şifrə səhvdir!"); }
        }

        function renderAdmin() {
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            foods.forEach((f, i) => {
                list.innerHTML += `
                    <div class="admin-item">
                        <span style="font-size:12px">${f.name}</span>
                        <input type="number" value="${f.price}" style="width:50px">
                    </div>`;
            });
        }

        renderMenu();
    </script>
</body>
</html>
