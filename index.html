<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Digital Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #fdfdfd;
            --text-color: #333;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            --border-radius: 25px; /* Kvadrat bənzəri dairə (Rounded Square) */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid #eee;
            transition: transform 0.2s;
        }

        .menu-card:active {
            transform: scale(0.95);
        }

        .menu-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: calc(var(--border-radius) - 5px);
            margin-bottom: 10px;
        }

        .menu-card h3 {
            font-size: 1rem;
            margin: 10px 0 5px;
            font-weight: 600;
        }

        .menu-card p {
            font-size: 0.75rem;
            color: #777;
            margin-bottom: 10px;
            height: 35px;
            overflow: hidden;
        }

        .price {
            font-weight: 600;
            color: #000;
            background: #f0f0f0;
            padding: 5px 15px;
            border-radius: 15px;
            display: inline-block;
        }

        /* Mobil üçün xüsusi nizam */
        @media (max-width: 400px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .menu-card {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
