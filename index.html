<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Black QR Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #d4af37; /* Qızılı rəng */
            --radius: 20px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Başlıq Hissəsi */
        .top-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .top-header h1 { font-size: 2rem; margin: 0; letter-spacing: 3px; color: var(--accent-color); }
        .top-header p { font-size: 0.9rem; margin: 5px 0; opacity: 0.8; }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 1.5rem;
        }
        .social-icons i { color: var(--accent-color); cursor: pointer; }

        /* Menyu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px;
            text-align: center;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .menu-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .menu-card h3 { font-size: 0.9rem; margin: 10px 0 5px; }
        .price { color: var(--accent-color); font-weight: 600; font-size: 1rem; }

        /* 3D Tərkib Modalı */
        #composition-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .ingredient-3d {
            width: 80px;
            height: 80px;
            background: #222;
            margin: 10px 0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transform: perspective(500px) rotateX(20deg);
            animation: float 2s infinite ease-in-out;
            border: 1px solid var(--accent-color);
        }

        .ingredient-3d span { font-size: 0.7rem; text-align: center; font-weight: bold; }

        @keyframes float {
            0%, 100% { transform: perspective(500px) rotateX(20deg) translateY(0); }
            50% { transform: perspective(500px) rotateX(20deg) translateY(-10px); }
        }

        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: white; }

        /* Admin Trigger */
        .admin-trigger { position: fixed; bottom: 0; left: 0; width: 50px; height: 50px; z-index: 999; opacity: 0; }
    </style>
</head>
<body>

    <div class="top-header">
        <h1>QR MENU</h1>
        <p>Dadlı yeməklər</p>
        <div class="social-icons">
            <i class="fab fa-tiktok"></i>
            <i class="fab fa-whatsapp"></i>
            <i class="fas fa-wifi"></i>
        </div>
    </div>

    <div class="menu-grid" id="menu-container"></div>

    <div id="composition-modal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <h2 id="modal-title" style="color: var(--accent-color);">Tərkibi</h2>
        <div id="ingredients-list"></div>
    </div>

    <div class="admin-trigger" onclick="adminClick()"></div>

    <script>
        // Yeməklər və Tərkibləri
        const foods = [
            { name: "Mərci Şorbası", price: "4 AZN", img: "https://images.pexels.com/photos/539451/pexels-photo-539451.jpeg?w=400", ingredients: ["Mərci", "Kərə yağı", "Limon", "Nanə"] },
            { name: "Sezar Salatı", price: "12 AZN", img: "https://images.pexels.com/photos/1213710/pexels-photo-1213710.jpeg?w=400", ingredients: ["Toyuq", "Parmezan", "Suxari", "Sous"] },
            { name: "Steyk Burger", price: "15 AZN", img: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?w=400", ingredients: ["Dana əti", "Çeddar", "Turşu", "Soğan"] },
            { name: "Pizza Marqarita", price: "14 AZN", img: "https://images.pexels.com/photos/1146760/pexels-photo-1146760.jpeg?w=400", ingredients: ["Motsarella", "Pomidor", "Reyhan", "Xəmir"] },
            { name: "Lülə Kabab", price: "10 AZN", img: "https://images.pexels.com/photos/2233729/pexels-photo-2233729.jpeg?w=400", ingredients: ["Quzu əti", "Quyruq", "Soğan", "Sumax"] },
            // Bu siyahını 30-a tamamlaya bilərsən
        ];

        // Digər yeməkləri avtomatik doldurmaq (Nümunə üçün)
        for(let i=6; i<=30; i++) {
            foods.push({
                name: "Təzə Yemək " + i, price: (i+2)+" AZN", img: "https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?w=400",
                ingredients: ["Təzə Ət", "Tərəvəz", "Sous", "Zirə"]
            });
        }

        const container = document.getElementById('menu-container');

        function renderMenu() {
            foods.forEach((food, index) => {
                container.innerHTML += `
                    <div class="menu-card" onclick="openComposition(${index})">
                        <img src="${food.img}" alt="${food.name}">
                        <h3>${food.name}</h3>
                        <div class="price">${food.price}</div>
                        <p style="font-size:0.6rem; color:#888; margin-top:5px;">Tərkibə baxmaq üçün toxun</p>
                    </div>
                `;
            });
        }

        function openComposition(index) {
            const modal = document.getElementById('composition-modal');
            const list = document.getElementById('ingredients-list');
            const title = document.getElementById('modal-title');
            
            title.innerText = foods[index].name + " (Tərkib)";
            list.innerHTML = '';
            
            foods[index].ingredients.forEach((ing, i) => {
                setTimeout(() => {
                    list.innerHTML += `
                        <div class="ingredient-3d">
                            <span>${ing}</span>
                        </div>
                    `;
                }, i * 200); // Elementlərin bir-bir gəlmə effekti
            });
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('composition-modal').style.display = 'none';
        }

        // Admin hissəsi (Firebase bağlıdırsa olduğu kimi qalır)
        let clickCount = 0;
        function adminClick() {
            clickCount++;
            if(clickCount >= 3) { alert("Admin Paneli üçün Firebase qoşulmalıdır."); clickCount = 0; }
        }

        renderMenu();
    </script>
</body>
</html>
