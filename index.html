<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Səliqəli Menyu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #ffffff;
            --text-color: #222;
            --shadow: 0 8px 20px rgba(0,0,0,0.06);
            --border-radius: 22px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fcfcfc;
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 600px;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 10px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
        }

        .menu-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 8px;
            background-color: #eee;
        }

        .menu-card h3 {
            font-size: 0.85rem;
            margin: 5px 0;
            font-weight: 600;
            height: 35px;
            overflow: hidden;
        }

        .menu-card p {
            font-size: 0.65rem;
            color: #777;
            margin-bottom: 8px;
            height: 30px;
            line-height: 1.2;
        }

        .price {
            font-weight: 600;
            font-size: 0.8rem;
            color: #000;
            background: #f2f2f2;
            padding: 6px 0;
            border-radius: 12px;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0; letter-spacing:1px;">RESTO MENU</h2>
        <p style="font-size:0.8rem; color:#888;">Xoş gəlmisiniz!</p>
    </header>

            { name: "Sezar Salatı", price: "12 AZN", desc: "Toyuq, parmezan, sous", img: "https://images.pexels.com/photos/1213710/pexels-photo-1213710.jpeg?auto=compress&cs=tinysrgb&w=400" },
            { name: "Yunan Salatı", price: "8 AZN", desc: "Təzə tərəvəzlər, feta", img: "https://images.pexels.com/photos/1211887/pexels-photo-1211887.jpeg?auto=compress&cs=tinysrgb&w=400" },
            { name: "Steyk Burger", price: "15 AZN", desc: "Dana əti, xüsusi sous", img: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?auto=compress&cs=tinysrgb&w=400" },

            { name: "Lülə Kabab", price: "10 AZN", desc: "Quzu əti, soğan və lavaş", img: "https://images.pexels.com/photos/2233729/pexels-photo-2233729.jpeg?auto=compress&cs=tinysrgb&w=400" },

            { name: "Çay Dəstəyi", price: "15 AZN", desc: "Mürəbbə və şirniyyat", img: "https://images.pexels.com/photos/1417945/pexels-photo-1417945.jpeg?auto=compress&cs=tinysrgb&w=400" },
            { name: "Amerikano", price: "5 AZN", desc: "Təzə qəhvə", img: "https://images.pexels.com/photos/312418/pexels-photo-312418.jpeg?auto=compress&cs=tinysrgb&w=400" },
            { name: "Kappuçino", price: "6 AZN", desc: "Bol köpüklü qəhvə", img: "https://images.pexels.com/photos/302899/pexels-photo-302899.jpeg?auto=compress&cs=tinysrgb&w=400" },
            { name: "Meyvə Şirəsi", price: "4 AZN", desc: "Təbii sıxılmış", img: "https://images.pexels.com/photos/1337825/pexels-photo-1337825.jpeg?auto=compress&cs=tinysrgb&w=400" }
        ];

        const container = document.getElementById('menu-container');

        foods.forEach(food => {
            const card = `
                <div class="menu-card">
                    <img src="${food.img}" alt="${food.name}" onerror="this.src='https://cdn.pixabay.com/photo/2013/07/13/13/14/meat-160611_640.png'">
                    <h3>${food.name}</h3>
                    <p>${food.desc}</p>
                    <div class="price">${food.price}</div>
                </div>
            `;
            container.innerHTML += card;
        });
    </script>
</body>
</html>
