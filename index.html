<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Digital Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #ffffff;
            --text-color: #222;
            --shadow: 0 10px 20px rgba(0,0,0,0.08);
            --border-radius: 20px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f8f8;
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin: 20px 0 30px;
        }

        header h1 {
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #000;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 12px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-card:active {
            transform: scale(0.96);
        }

        .menu-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 15px; /* Kvadrat bənzəri dairəvi künclər */
            margin-bottom: 12px;
        }

        .menu-card h3 {
            font-size: 0.95rem;
            margin: 5px 0;
            font-weight: 600;
            line-height: 1.2;
        }

        .menu-card p {
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 10px;
            min-height: 32px;
        }

        .price {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            background: #000;
            padding: 6px 0;
            border-radius: 12px;
            width: 100%;
        }

        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <header>

        const container = document.getElementById('menu-container');

        foods.forEach(food => {
            const card = `
                <div class="menu-card">
                    <img src="${food.img}" alt="${food.name}">
                    <div>
                        <h3>${food.name}</h3>
                        <p>${food.desc}</p>
                    </div>
                    <div class="price">${food.price}</div>
                </div>
            `;
            container.innerHTML += card;
        });
    </script>
</body>
</html>
