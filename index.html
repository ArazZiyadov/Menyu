<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Visual Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #000000; --card: #121212; --gold: #d4af37; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 15px; }
        
        header { text-align: center; margin-top: 30px; margin-bottom: 40px; }
        header h1 { color: var(--gold); font-size: 2.2rem; letter-spacing: 5px; margin: 0; }
        .social-icons { display: flex; justify-content: center; gap: 25px; margin-top: 20px; }
        .social-icons i { color: var(--gold); font-size: 1.8rem; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 800px; margin: 0 auto; }
        .menu-card { background: var(--card); border-radius: 20px; padding: 12px; text-align: center; border: 1px solid #222; }
        .menu-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; }
        .price { color: var(--gold); font-weight: 600; }

        /* --- CANLI 3D TƏRKİB MODALI --- */
        #comp-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        
        .ing-container { 
            display: flex; flex-direction: column; gap: 20px; 
            perspective: 1000px; padding-top: 20px;
        }

        .ing-item-3d {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px; border-radius: 50px;
            border: 1px solid var(--gold);
            transform: rotateX(20deg);
            animation: floatLive 3s infinite ease-in-out;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
        }

        /* İnqrediyent Şəkli */
        .ing-img {
            width: 50px; height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(255,255,255,0.3));
        }

        @keyframes floatLive {
            0%, 100% { transform: rotateX(20deg) translateY(0) scale(1); }
            50% { transform: rotateX(10deg) translateY(-15px) scale(1.05); }
        }

        .close-modal { position: absolute; top: 30px; right: 30px; font-size: 2.5rem; color: var(--white); cursor: pointer; }

        /* Admin Panel Hissələri (Dəyişilməyib) */
        #admin-login, #admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdfaf5; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: #333; }
        .login-box { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 85%; }
        .admin-trigger { position: fixed; bottom: 0; right: 0; width: 60px; height: 60px; z-index: 999; opacity: 0; }
    </style>
</head>
<body>

    <header>
        <h1>QR MENU</h1>
        <p>Dadlı yeməklər</p>
        <div class="social-icons">
            <i class="fab fa-tiktok"></i><i class="fab fa-whatsapp"></i><i class="fas fa-wifi"></i>
        </div>
    </header>

    <div class="menu-grid" id="menu-container"></div>

    <div id="comp-modal" onclick="this.style.display='none'">
        <span class="close-modal">&times;</span>
        <h2 id="modal-title" style="color: var(--gold); margin-bottom: 20px; text-align: center;"></h2>
        <div class="ing-container" id="ing-list"></div>
    </div>

    <div class="admin-trigger" onclick="adminBtn()"></div>

    <script>
        const firebaseConfig = { databaseURL: "SƏNİN_LİNKİN" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // İnqrediyent Şəkilləri Bazası (PNG formatında canlı görüntülər)
        const ingIcons = {
            "Ət": "https://cdn-icons-png.flaticon.com/512/3143/3143640.png",
            "Yumurta": "https://cdn-icons-png.flaticon.com/512/837/837165.png",
            "Pomidor": "https://cdn-icons-png.flaticon.com/512/1202/1202125.png",
            "Pendir": "https://cdn-icons-png.flaticon.com/512/819/819873.png",
            "Mərci": "https://cdn-icons-png.flaticon.com/512/7145/7145013.png",
            "Toyuq": "https://cdn-icons-png.flaticon.com/512/3143/3143641.png",
            "Sous": "https://cdn-icons-png.flaticon.com/512/3449/3449377.png",
            "Limon": "https://cdn-icons-png.flaticon.com/512/2909/2909808.png"
        };

        const foods = [
            { name: "Mərci Şorbası", price: 4, img: "https://images.pexels.com/photos/539451/pexels-photo-539451.jpeg?w=400", components: ["Mərci", "Limon", "Sous"] },
            { name: "Kabab", price: 10, img: "https://images.pexels.com/photos/2233729/pexels-photo-2233729.jpeg?w=400", components: ["Ət", "Pomidor", "Sous"] },
            { name: "Səhər Yeməyi", price: 8, img: "https://images.pexels.com/photos/103124/pexels-photo-103124.jpeg?w=400", components: ["Yumurta", "Pendir", "Pomidor"] }
        ];

        function renderMenu() {
            const container = document.getElementById('menu-container');
            foods.forEach((food, index) => {
                container.innerHTML += `
                <div class="menu-card" onclick="openLive3D(${index})">
                    <img src="${food.img}">
                    <h3>${food.name}</h3>
                    <div class="price">${food.price} AZN</div>
                </div>`;
            });
        }

        window.openLive3D = function(index) {
            const food = foods[index];
            document.getElementById('modal-title').innerText = food.name + " Tərkibi";
            const list = document.getElementById('ing-list');
            list.innerHTML = '';

            food.components.forEach((item, i) => {
                const icon = ingIcons[item] || "https://cdn-icons-png.flaticon.com/512/706/706164.png";
                setTimeout(() => {
                    list.innerHTML += `
                    <div class="ing-item-3d">
                        <img src="${icon}" class="ing-img">
                        <span>${item}</span>
                    </div>`;
                }, i * 300);
            });
            document.getElementById('comp-modal').style.display = 'flex';
        }

        // Admin girişi üçün sadə düymə funksiyası (Admin koda toxunmadım)
        let clicks = 0;
        function adminBtn() { clicks++; if(clicks >= 3) { alert("Admin panel aktivdir (Firebase qoşun)"); clicks=0; } }

        renderMenu();
    </script>
</body>
</html>
