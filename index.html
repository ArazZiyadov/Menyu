<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Digital Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #ffffff;
            --text-color: #333;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            --border-radius: 25px; /* Kvadrat bənzəri dairə */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobil üçün yan-yana iki dənə */
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 12px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .menu-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }

        .menu-card h3 {
            font-size: 0.9rem;
            margin: 5px 0;
            font-weight: 600;
        }

        .menu-card p {
            font-size: 0.7rem;
            color: #777;
            margin-bottom: 10px;
            height: 32px;
            overflow: hidden;
        }

        .price {
            font-weight: 600;
            color: #000;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>

        ];

        const container = document.getElementById('menu-container');

        foods.forEach(food => {
            const card = `
                <div class="menu-card">
                    <img src="${food.img}" alt="${food.name}" onerror="this.src='https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?auto=compress&cs=tinysrgb&w=200'">
                    <h3>${food.name}</h3>
                    <p>${food.desc}</p>
                    <div class="price">${food.price}</div>
                </div>
            `;
            container.innerHTML += card;
        });
    </script>
</body>
</html>
